<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- stylesheet -->
    <link rel="stylesheet" href="style/style.css">

    <!-- fav-icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font-family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind+daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <!-- Navbar & Search -->
    <nav>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-active bg-white border border-none text-xl"><i
                        class="fa-brands fa-github text-4xl"></i> GitHub Issues
                    Tracker</a>
            </div>

            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="search-input" type="text" placeholder="Search Issues..." required />
                    </label>
                    <div class="validator-hint hidden">Search Github Issues</div>
                </div>
                <button id="search-btn" class="btn btn-primary rounded-r-sm">Search</button>
            </div>
        </div>
    </nav>

    <!-- Buttons & Spinner -->
    <header>
        <!-- Buttons -->
        <section class="w-11/12 mx-auto bg-base-100 p-3 flex gap-3 shadow my-2 rounded-sm">
            <button id="all-btn" class="btn btn-outline btn-primary btn-active">All</button>
            <button id="open-btn" class="btn btn-outline btn-primary">Open</button>
            <button id="closed-btn" class="btn btn-outline btn-primary">Closed</button>
        </section>

        <!-- Spinner -->
        <section id="spinner" class="w-11/12 flex justify-center hidden">
            <span class="loading loading-spinner loading-lg py-3"></span>
        </section>
    </header>

    <main class="bg-base-100">
        <!-- Count-Section -->
        <section class="w-11/12 mx-auto bg-base-100 flex justify-between border-2 rounded-sm border-gray-200 p-4">
            <div class="flex items-center gap-2">
                <!-- <div><i class="fa-regular fa-rectangle-list text-3xl"></i></div> -->
                <div><img src="./assets/Aperture.png" alt=""></div>

                <div>
                    <p class="font-semibold text-xl"><span id="count">0</span> Issues</p>
                    <p class="text-gray-500 font-medium">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4">
                <div id="open" class="flex gap-1 items-center">
                    <p class="w-4 h-4 bg-green-500 rounded-full"> </p>
                    <p>Open</p>
                </div>

                <div id="closed" class="flex gap-1 items-center">
                    <p class="w-4 h-4 bg-purple-500 rounded-full"> </p>
                    <p>Closed</p>
                </div>
            </div>


        </section>

        <!-- All-Issues-Card -->
        <section id="issues-container">
            <section id="all-issues-container"
                class="w-11/12 mx-auto grid gap-5 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 my-5 bg-base-200 shadow p-4">

                <!-- Card-1 -->

            </section>

            <!-- Open-Issues-Card -->
            <section id="open-issues-container"
                class="w-11/12 mx-auto grid gap-5 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 my-5 bg-base-200 shadow p-4 hidden">

                <!-- Card-2 -->

            </section>

            <!-- Closed-Issues-Card -->
            <section id="closed-issues-container"
                class="w-11/12 mx-auto grid gap-5 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 my-5 bg-base-200 shadow p-4 hidden">

                <!-- Card-3 -->

            </section>
        </section>

        <!-- Modal -->
        <section>
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
            <dialog id="issues_modal" class="modal">
                <div id="issues-details" class="modal-box space-y-6">

                </div>
            </dialog>
        </section>

        </section>

    </main>

    <script src="./script/github_issue_tracker.js"></script>
</body>

</html>
