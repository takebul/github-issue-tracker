<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- stylesheet -->
    <link rel="stylesheet" href="style/style.css">

    <!-- fav-icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font-family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind+daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-200">

    <main class="min-h-screen max-w-md mx-auto bg-white shadow">
        <section class="justify-items-center">

            <!-- Header -->
            <div class="justify-items-center py-6">
                <!-- <img class="" src="./assets/github-logo.png" alt=""> -->
                <p class="text-8xl"><i class="fa-brands fa-github"></i></p>

                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>

            <!-- input -->
            <div class="">
                <fieldset class="fieldset rounded-box w-md p-4 ml-7">
                    <label class="label font-semibold text-black">Username</label>
                    <input type="text" class="input w-sm" placeholder="Enter Username" />
                    <p class="text-primary pb-1">Default: admin</p>

                    <label class="label font-semibold text-black">Password</label>
                    <input type="password" class="input w-sm" placeholder="Enter Password" />
                    <p class="text-primary">Default: admin123</p>

                    <button class="btn btn-primary mt-4 w-sm">Sign In</button>
                </fieldset>
            </div>

            <!-- horizontal line -->
            <div class="divider w-11/12">Or</div>

            <!-- footer -->
            <div class="text-center w-11/12">
                <p class="text-gray-500 pb-1.5">Demo Credentials:</p>
                <div class="bg-base-300 py-4 rounded-md">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>

        </section>
    </main>

</body>

</html>
